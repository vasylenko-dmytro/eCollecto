name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - name: Run backend tests
        run: ./gradlew :backend:ecollecto-backend:test
      - name: Check openapi.yaml is up to date
        # OpenApiSpecTest regenerates openapi.yaml as a side-effect of ./gradlew test.
        # This step fails the build when the committed spec diverges from what Springdoc generates.
        # Fix: run  ./gradlew :backend:ecollecto-backend:test  locally and commit the result.
        run: |
          git diff --exit-code backend/ecollecto-backend/openapi.yaml || {
            echo "::error file=backend/ecollecto-backend/openapi.yaml::openapi.yaml is out of date. Run './gradlew :backend:ecollecto-backend:test' locally and commit the regenerated file."
            exit 1
          }
      - name: Generate Jacoco report
        run: ./gradlew :backend:ecollecto-backend:jacocoTestReport

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/ecollecto-ui/package-lock.json
      - name: Install dependencies
        run: cd frontend/ecollecto-ui && npm ci
      - name: Lint
        run: cd frontend/ecollecto-ui && npm run lint
      - name: Build
        run: cd frontend/ecollecto-ui && npm run build
      - name: Test
        run: cd frontend/ecollecto-ui && npm run test -- --run

