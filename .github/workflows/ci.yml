name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
      - name: Run backend tests
        run: ./gradlew :backend:ecollecto-backend:test
      - name: Generate Jacoco report
        run: ./gradlew :backend:ecollecto-backend:jacocoTestReport

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/ecollecto-ui/package-lock.json
      - name: Install dependencies
        run: cd frontend/ecollecto-ui && npm ci
      - name: Lint
        run: cd frontend/ecollecto-ui && npm run lint
      - name: Build
        run: cd frontend/ecollecto-ui && npm run build
      - name: Test
        run: cd frontend/ecollecto-ui && npm run test -- --run

