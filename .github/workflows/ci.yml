name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - name: Run backend tests
        run: ./gradlew :backend:ecollecto-backend:test
      - name: Check openapi.yaml is up to date
        # OpenApiSpecTest regenerates openapi.yaml as a side-effect of ./gradlew test.
        # This step fails the build when the committed spec diverges from what Springdoc generates.
        # Fix: run  ./gradlew :backend:ecollecto-backend:test  locally and commit the result.
        run: |
          git diff --exit-code -- backend/ecollecto-backend/openapi.yaml || {
            echo "::error file=backend/ecollecto-backend/openapi.yaml::openapi.yaml is out of date. Run './gradlew :backend:ecollecto-backend:test' locally and commit the regenerated file."
            exit 1
          }
      - name: Generate Jacoco report
        run: ./gradlew :backend:ecollecto-backend:jacocoTestReport

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/ecollecto-ui/package-lock.json
      - name: Install dependencies
        run: cd frontend/ecollecto-ui && npm ci
      - name: Check generated TypeScript types are up to date
        # npm run generate:types reads openapi.yaml and regenerates api.generated.ts.
        # Fails if the committed file is stale; fix: run 'npm run generate:types' locally and commit.
        run: |
          cd frontend/ecollecto-ui && npm run generate:types
          cd "$GITHUB_WORKSPACE"
          git diff --exit-code -- frontend/ecollecto-ui/src/features/product/types/api.generated.ts || {
            echo "::error file=frontend/ecollecto-ui/src/features/product/types/api.generated.ts::api.generated.ts is out of date. Run 'npm run generate:types' in frontend/ecollecto-ui and commit the result."
            exit 1
          }
      - name: Lint
        run: cd frontend/ecollecto-ui && npm run lint
      - name: Build
        run: cd frontend/ecollecto-ui && npm run build
      - name: Test
        run: cd frontend/ecollecto-ui && npm run test -- --run

